<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="T-shirt weather">
  <!-- Vintage Miami Art Deco travel poster: flat, screen-printed, sun-faded pastels.
       South Beach aqua tile (matches theme-color / the map's sea), a gold Deco sunburst,
       and a warm coral tee with a cream screen-print outline. No gradients. See DESIGN.md. -->

  <!-- aqua sea tile with streamline-Deco rounded corners -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#6fd0ce"/>

  <!-- gold Deco sunburst peeking from the top-left corner -->
  <g fill="none" stroke="#f5b52e" stroke-width="2.4" stroke-linecap="round">
    <path d="M15 3.2v4 M3.2 15h4 M6.4 6.4l2.8 2.8 M23.6 6.4l-2.8 2.8 M6.4 23.6l2.8-2.8 M24.2 15h4"/>
  </g>
  <circle cx="15" cy="15" r="6.8" fill="#f5b52e"/>

  <!-- warm coral tee — the hero mark — with a cream screen-print outline -->
  <path fill="#ec7d5c" stroke="#fbf3e2" stroke-width="2.2" stroke-linejoin="round"
        d="M26 21 L18 24 L12 34 L20 38 L22 37 L22 51 Q22 54 25 54 L39 54 Q42 54 42 51 L42 37 L44 38 L52 34 L46 24 L38 21 Q32 27 26 21 Z"/>
</svg>
