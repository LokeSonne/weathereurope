<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="Weather">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4aa6ea"/>
      <stop offset="1" stop-color="#9ad2f4"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#ff9d2b"/>
    </radialGradient>
    <linearGradient id="cloud" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7eef6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#sky)"/>

  <!-- sun rays peeking from behind the cloud -->
  <g stroke="#ffd257" stroke-width="3.2" stroke-linecap="round">
    <line x1="24" y1="9" x2="24" y2="3"/>
    <line x1="13.9" y1="13.9" x2="9.6" y2="9.6"/>
    <line x1="10" y1="24" x2="4" y2="24"/>
    <line x1="13.9" y1="34.1" x2="9.6" y2="38.4"/>
  </g>

  <!-- sun -->
  <circle cx="24" cy="24" r="10.5" fill="url(#sun)"/>

  <!-- cloud -->
  <g fill="url(#cloud)">
    <circle cx="41" cy="37" r="12.5"/>
    <circle cx="27.5" cy="41" r="9.5"/>
    <circle cx="34" cy="30.5" r="10.5"/>
    <rect x="19" y="41" width="35" height="13" rx="6.5"/>
  </g>
</svg>
