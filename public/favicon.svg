<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="T-Shirt Weather">
  <!-- Vintage Miami Art Deco travel poster mark: flat, screen-printed, sun-faded. A "TW"
       monogram in the Poiret One display face (outlined to a path so no font is needed),
       between two flamingo streamline "rules" — the same lockup as the map wordmark — with a
       flat single-tone Deco sun in the top-left corner. No gradients. See DESIGN.md. -->

  <defs>
    <clipPath id="tile"><rect x="0" y="0" width="64" height="64" rx="14"/></clipPath>
  </defs>

  <!-- South Beach aqua tile (matches theme-color / the map's sea) -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="#6fd0ce"/>

  <!-- flat Deco sun peeking from the top-left corner, clipped to the tile's rounded edge -->
  <g clip-path="url(#tile)">
    <circle cx="13" cy="12" r="14" fill="#f3ad3f"/>
  </g>

  <!-- flamingo streamline rules — the wordmark's flanking speed-lines -->
  <g stroke="#e86a93" stroke-width="2.6" stroke-linecap="round">
    <line x1="17" y1="14" x2="47" y2="14"/>
    <line x1="17" y1="18" x2="47" y2="18"/>
    <line x1="17" y1="50" x2="47" y2="50"/>
    <line x1="17" y1="54" x2="47" y2="54"/>
  </g>

  <!-- "TW" monogram in Poiret One, converted to outlines (deco-navy ink) -->
  <path fill="#1c3b52" d="M14.50 23.25L23.93 23.25L23.93 23.97L19.65 23.97L19.65 42L18.82 42L18.82 23.97L14.50 23.97L14.50 23.25M37.13 33.17L33.15 42.33L24.93 23.25L25.85 23.25L33.27 40.42L36.75 32.30L32.88 23.25L33.77 23.25L37.25 31.48L40.83 23.25L41.53 23.25L37.63 32.27L41.17 40.50L48.75 23.25L49.42 23.25L41.10 42.33Z"/>
</svg>
