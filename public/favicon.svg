<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="T-shirt weather">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4aa6ea"/>
      <stop offset="1" stop-color="#9ad2f4"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="1" stop-color="#ffab34"/>
    </radialGradient>
    <linearGradient id="tee" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8f6b"/>
      <stop offset="1" stop-color="#f4623c"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#sky)"/>

  <!-- sun peeking in the top-left corner -->
  <g stroke="#ffd257" stroke-width="2.6" stroke-linecap="round">
    <line x1="14" y1="7" x2="14" y2="2.5"/>
    <line x1="6.5" y1="9.5" x2="3.5" y2="6.5"/>
    <line x1="4" y1="17" x2="-0.5" y2="17"/>
  </g>
  <circle cx="14" cy="17" r="7.5" fill="url(#sun)"/>

  <!-- t-shirt -->
  <path fill="url(#tee)" stroke="#ffffff" stroke-width="1.4" stroke-linejoin="round"
        d="M26 20 L18 23 L12 33 L20 37 L22 36 L22 50 Q22 53 25 53 L39 53 Q42 53 42 50 L42 36 L44 37 L52 33 L46 23 L38 20 Q32 26 26 20 Z"/>
</svg>
